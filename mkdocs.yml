site_name: 深核手冊
site_description: >-
  深核手冊：從模型數學、乾淨參考實作到多 GPU 效能工程，系統化看穿現代
  ML 系統如何在 GPU kernel 上跑得快。核心深度路線：Mixture-of-Experts (MoE) 與 AITER。
site_author: deep-kernel-handbook contributors
site_url: https://youyun8.github.io/deep-kernel-handbook/

# Repository
repo_name: youyun8/deep-kernel-handbook
repo_url: https://github.com/youyun8/deep-kernel-handbook
edit_uri: edit/main/docs/

copyright: >-
  內容採 CC BY 4.0 授權，程式碼採 MIT 授權，詳見 repository LICENSE。

theme:
  name: material
  language: zh-TW
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme)"
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-auto
        name: 切換為亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切換為深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 跟隨系統偏好
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/chip
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/youyun8/deep-kernel-handbook
  generator: false

extra_css:
  - https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/katex.js
  - javascripts/site-settings.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - 首頁: index.md
  - 閱讀路線: reading-path.md
  - "第一部 · 基礎":
      - foundations/index.md
      - 從零實作 Transformer: foundations/transformer-from-scratch.md
      - 作為系統的 Transformer: foundations/transformer-systems.md
      - Attention 效率: foundations/attention-efficiency.md
      - 從零實作 FlashAttention: foundations/flashattention.md
      - 數值與精度: foundations/numerics-precision.md
  - "第二部 · Mixture-of-Experts":
      - moe/index.md
      - 為什麼需要稀疏化: moe/why-sparsity.md
      - 從零實作 MoE layer: moe/moe-from-scratch.md
      - 負載平衡: moe/load-balancing.md
      - Routing 變體: moe/routing-variants.md
      - 訓練穩定性: moe/training-stability.md
      - 系統與 expert parallelism: moe/systems-ep.md
      - MoE kernels (Triton / CUDA / HIP): moe/kernels.md
      - 推論與 serving: moe/inference-serving.md
      - 案例研究: moe/case-studies.md
      - MoE decode 剖析: moe/decode-anatomy.md
  - "第三部 · 效能":
      - performance/index.md
      - GPU 程式設計模型: performance/gpu-programming.md
      - Triton 路線: performance/triton-track.md
      - CUDA / HIP 路線: performance/cuda-hip-track.md
      - 分散式訓練: performance/distributed-training.md
      - 量化與壓縮: performance/quantization.md
      - Inference 優化: performance/inference-optimization.md
      - Profiling 與方法論: performance/profiling.md
  - "第四部 · AITER":
      - AITER decode 深入解析: aiter/index.md
  - "第五部 · 實戰專案":
      - capstones/index.md
      - 建立小型 MoE LM: capstones/build-moe.md
      - 擴展到更大規模: capstones/scaling.md
  - 解答:
      - solutions/index.md
      - "第一部 · 基礎": solutions/foundations.md
      - "第二部 · Mixture-of-Experts": solutions/moe.md
      - "第三部 · 效能": solutions/performance.md
      - "第五部 · 實戰專案": solutions/capstones.md
  - 參考資料:
      - 詞彙表: glossary.md
      - 書目與連結: references.md
